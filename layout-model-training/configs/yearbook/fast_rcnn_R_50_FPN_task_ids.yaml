_BASE_: "../prima/fast_rcnn_R_50_FPN_3x.yaml"

# ── Optimised for 19 training images (ayantee1939negr task-ID subset) ──────────
#
# Dataset:   19 train images, 393 text boxes (Name + Additional Text)
#            78 val  images, 3036 text boxes (clean-val minus training overlap)
#
# Epoch math: IMS_PER_BATCH=2 → ~10 steps/epoch
#   MAX_ITER 2000 ≈ 200 effective epochs  (fine-tuning regime for small dataset)
#
# LR rationale:
#   Reference text-only run used LR=0.0005 on 329 images.
#   Scaling proportionally: 0.0005 × (19/329) ≈ 0.000029 is too aggressive in
#   the opposite direction, so we use a more empirically safe halving: 0.00025.
#   Warmup for the first 200 iters (20 effective epochs) guards against early
#   training instability on a tiny dataset.
# ────────────────────────────────────────────────────────────────────────────────

MODEL:
  DEVICE: cuda
  ROI_HEADS:
    NUM_CLASSES: 1             # single "text" class
    SCORE_THRESH_TEST: 0.3
    NMS_THRESH_TEST: 0.3
  # COCO-pretrained Faster R-CNN R-50-FPN backbone
  WEIGHTS: "detectron2://COCO-Detection/faster_rcnn_R_50_FPN_3x/137849458/model_final_280758.pkl"
  BACKBONE:
    FREEZE_AT: 2               # keep early ResNet layers frozen to prevent overfit
  ANCHOR_GENERATOR:
    SIZES:
      - [8,  16]
      - [16, 32]
      - [32, 64]
      - [64, 128]
      - [128, 256]
    ASPECT_RATIOS:
      - [0.25, 0.5, 1.0, 2.0, 4.0]   # wide aspect ratios for text boxes

SOLVER:
  IMS_PER_BATCH: 2
  BASE_LR: 0.00025             # conservative: halved from full-dataset 0.0005
  WARMUP_ITERS: 200            # ~20 effective epochs of warm-up
  WARMUP_FACTOR: 0.001
  WARMUP_METHOD: linear
  MAX_ITER: 2000               # ~200 effective epochs on 19 images
  STEPS: [1400, 1800]          # LR × 0.1 at 70 % and 90 % of training
  GAMMA: 0.1
  CHECKPOINT_PERIOD: 500       # save every ~50 effective epochs

INPUT:
  MIN_SIZE_TRAIN: (800,)
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

TEST:
  EVAL_PERIOD: 200             # evaluate every ~20 effective epochs

OUTPUT_DIR: "../outputs/yearbook-task-ids/fast_rcnn_R_50_FPN/"
